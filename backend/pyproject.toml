[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "S", "B", "ANN"]
ignore = [
    "S101",    # assert usage is fine in tests
]

[tool.ruff.lint.per-file-ignores]
"migrations/**" = ["ANN", "N999"]
"tests/**" = ["ANN", "S"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]
exclude = ["migrations/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
