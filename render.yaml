services:
  - type: web
    name: myperks-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Set this to your Neon connection string (postgresql+asyncpg://...)
      # Get it from: neon.tech → your project → Connection Details
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      # Set to your Vercel frontend URL, e.g. https://myperks.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
